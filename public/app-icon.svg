<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="50%" style="stop-color:#8B7CF7"/>
      <stop offset="100%" style="stop-color:#FFB8C6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>
  <!-- Stars -->
  <g filter="url(#glow)">
    <polygon points="256,120 270,165 318,165 280,192 292,238 256,210 220,238 232,192 194,165 242,165" fill="#F9CA24"/>
    <polygon points="150,100 158,125 184,125 163,140 170,165 150,150 130,165 137,140 116,125 142,125" fill="#FFFFFF" opacity="0.8"/>
    <polygon points="370,130 376,148 395,148 380,159 385,177 370,166 355,177 360,159 345,148 364,148" fill="#FFFFFF" opacity="0.7"/>
    <polygon points="320,80 324,93 338,93 327,101 330,114 320,106 310,114 313,101 302,93 316,93" fill="#FFFFFF" opacity="0.6"/>
  </g>
  <!-- Text -->
  <text x="256" y="320" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="800" font-size="80" fill="white">운명의</text>
  <text x="256" y="410" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="800" font-size="80" fill="white">아이</text>
  <text x="256" y="465" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.7)">AI 사주 작명</text>
</svg>
